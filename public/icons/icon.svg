<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 40 432 432">
  <defs>
    <radialGradient id="gp" cx="25%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#3a1060" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gt" cx="76%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#00303a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D040E0"/>
      <stop offset="28%"  stop-color="#9040D8"/>
      <stop offset="60%"  stop-color="#4860FF"/>
      <stop offset="100%" stop-color="#00D8E8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#08080f"/>
  <rect width="512" height="512" fill="url(#gp)"/>
  <rect width="512" height="512" fill="url(#gt)"/>

  <!-- Outer house -->
  <path d="M256,82 L436,274 L436,422 L394,462 L118,462 L76,422 L76,274 Z"
        fill="none" stroke="url(#hg)" stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Inner house -->
  <path d="M256,142 L396,296 L396,402 L364,434 L148,434 L116,402 L116,296 Z"
        fill="none" stroke="url(#hg)" stroke-width="15" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- List lines (left-aligned, staggered lengths) -->
  <line x1="170" y1="340" x2="298" y2="340" stroke="url(#hg)" stroke-width="15" stroke-linecap="round"/>
  <line x1="158" y1="375" x2="325" y2="375" stroke="url(#hg)" stroke-width="15" stroke-linecap="round"/>
  <line x1="152" y1="410" x2="342" y2="410" stroke="url(#hg)" stroke-width="15" stroke-linecap="round"/>
</svg>
