services:
  app:
    build: .
    image: homepanel:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    networks: [internal]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/signin"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks: [internal]

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: homepanel-bot:latest
    restart: unless-stopped
    env_file: .env
    environment:
      APP_INTERNAL_URL: "http://app:3000"
    volumes:
      - ./data:/data
    depends_on:
      app:
        condition: service_healthy
    networks: [internal]

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
